<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议签到</title>
    <script src="https://cdn.staticfile.org/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: system-ui; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 320px; }
        #qrcode { margin: 20px auto; display: block; }
        #qrcode img { margin: 0 auto; }
        .tips { color: #666; font-size: 14px; margin-top: 15px; }
        .timer { color: #ff4d4f; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin-bottom:10px">请现场员工扫码签到</h2>
        <div id="qrcode"></div>
        <div class="timer" id="timer">正在生成动态码...</div>
        <p class="tips">⚠️ 请务必在会议室现场扫码</p>
    </div>

    <script>
        // 初始化二维码
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 200, height: 200, colorDark : "#000000", colorLight : "#ffffff"
        });

        function refresh() {
            // 纯本地生成随机码，不需要过墙，不卡顿
            var randomToken = Math.random().toString(36).slice(2);
            qrcode.makeCode("https://your-checkin-logic.com?t=" + randomToken);
            
            var sec = 10;
            var countdown = setInterval(function() {
                sec--;
                document.getElementById("timer").innerText = "二维码将在 " + sec + " 秒后更新";
                if (sec <= 0) {
                    clearInterval(countdown);
                    refresh();
                }
            }, 1000);
        }
        
        // 只要页面一加载，立刻出码
        window.onload = refresh;
    </script>
</body>
</html>
