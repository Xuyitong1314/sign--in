<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动态防作弊签到系统</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h2 { color: #333; margin-top: 0; }
        #qrcode { margin: 20px auto; padding: 10px; background: white; display: inline-block; border: 1px solid #eee; }
        .timer { color: #ff4d4f; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .footer { font-size: 0.8em; color: #888; margin-top: 20px; }
        button { background: #07c160; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>会议现场签到</h2>
        <div id="qrcode"></div>
        <div class="timer" id="status">正在初始化...</div>
        <p style="font-size: 0.9em; color: #666;">请使用微信扫码，并允许获取地理位置</p>
        <div class="footer">由 Vercel + Next.js 驱动 (大拿推荐方案)</div>
    </div>

    <script>
        // 自动更新的动态令牌，每10秒变一次
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "loading...",
            width: 200,
            height: 200
        });

        function updateQR() {
            // 获取当前时间戳作为防作弊动态码
            let token = Math.random().toString(36).substring(2, 10);
            let now = new Date().getTime();
            // 这里拼接你的签到逻辑网址，或者简单的识别码
            qrcode.makeCode("SIGN_IN_" + token + "_" + now);
            
            let count = 10;
            document.getElementById("status").innerText = "二维码将在 " + count + " 秒后更新";
            
            let timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    updateQR();
                } else {
                    document.getElementById("status").innerText = "二维码将在 " + count + " 秒后更新";
                }
            }, 1000);
        }

        // 启动
        window.onload = updateQR;
    </script>
</body>
</html>
